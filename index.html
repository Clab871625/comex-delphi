<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>COMEX Delphi</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Segoe UI',sans-serif;background:#0f1117;color:#e8ecff;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
.card{background:#181c2a;border:1px solid #2a3050;border-radius:16px;padding:28px;width:100%;max-width:600px}
.header{display:flex;align-items:center;gap:12px;margin-bottom:24px}
.logo{width:40px;height:40px;background:linear-gradient(135deg,#3d5aff,#00d4a0);border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:20px}
.title{font-size:20px;font-weight:700}
.sub{font-size:12px;color:#8892b0;margin-top:2px}
.field{margin-bottom:16px}
label{font-size:11px;color:#8892b0;letter-spacing:.1em;text-transform:uppercase;display:block;margin-bottom:6px}
input,textarea{width:100%;background:#1e2336;border:1px solid #2a3050;border-radius:10px;padding:11px 14px;color:#e8ecff;font-family:'Segoe UI',sans-serif;font-size:13px;outline:none;transition:border .2s;resize:vertical}
input:focus,textarea:focus{border-color:#3d5aff}
textarea{min-height:160px;line-height:1.6}
.btn{width:100%;background:linear-gradient(135deg,#3d5aff,#5570ff);color:#fff;border:none;border-radius:11px;padding:14px;font-size:14px;font-weight:700;cursor:pointer;margin-top:8px;display:flex;align-items:center;justify-content:center;gap:8px;transition:all .15s}
.btn:hover{filter:brightness(1.1)}
.btn:disabled{opacity:.5;cursor:not-allowed}
.spinner{width:18px;height:18px;border:2px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.result{margin-top:16px;border-radius:12px;padding:14px 16px;display:none}
.result.ok{background:rgba(0,212,160,.08);border:1px solid rgba(0,212,160,.25)}
.result.erro{background:rgba(255,69,69,.08);border:1px solid rgba(255,69,69,.25)}
.result-title{font-size:13px;font-weight:700;margin-bottom:6px}
.result.ok .result-title{color:#00d4a0}
.result.erro .result-title{color:#ff4545}
.result-body{font-size:12px;color:#8892b0;line-height:1.7;white-space:pre-wrap}
.hint{font-size:11px;color:#4a5270;margin-top:12px;line-height:1.6}
</style>
</head>
<body>
<div class="card">
  <div class="header">
    <div class="logo">🚢</div>
    <div>
      <div class="title">COMEX Delphi</div>
      <div class="sub">Extração automática de tarifas · Deepseek + Supabase</div>
    </div>
  </div>
  <div class="field">
    <label>Remetente</label>
    <input id="remetente" placeholder="jimmy@auroralog.cn">
  </div>
  <div class="field">
    <label>Assunto</label>
    <input id="assunto" placeholder="COMEX - Tarifas Abril 2026">
  </div>
  <div class="field">
    <label>Cole o corpo do e-mail aqui</label>
    <textarea id="corpo" placeholder="Cole o conteúdo do e-mail COMEX aqui..."></textarea>
  </div>
  <button class="btn" id="btn" onclick="enviar()">
    🚀 Extrair tarifas e salvar no Supabase
  </button>
  <div class="result" id="result">
    <div class="result-title" id="result-title"></div>
    <div class="result-body" id="result-body"></div>
  </div>
  <div class="hint">💡 Cole o corpo do e-mail COMEX, clique no botão e as tarifas são extraídas pelo Deepseek e salvas no Supabase automaticamente.</div>
</div>
<script>
const WEBHOOK = 'https://n8n.srv1544125.hstgr.cloud/webhook/comex-delphi';
async function enviar(){
  const remetente = document.getElementById('remetente').value.trim();
  const assunto   = document.getElementById('assunto').value.trim();
  const corpo     = document.getElementById('corpo').value.trim();
  if(!corpo){ alert('Cole o corpo do e-mail!'); return; }
  const btn = document.getElementById('btn');
  btn.disabled = true;
  btn.innerHTML = '<div class="spinner"></div> Processando com Deepseek...';
  const result = document.getElementById('result');
  result.style.display = 'none';
  try {
    const res  = await fetch(WEBHOOK, { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({remetente, assunto, corpo}) });
    const data = await res.json();
    if(res.ok && data.ok){
      document.getElementById('result-title').textContent = '✅ ' + data.tarifas + ' tarifa(s) salvas no Supabase!';
      document.getElementById('result-body').textContent  = data.mensagem || '';
      result.className = 'result ok';
    } else {
      document.getElementById('result-title').textContent = '❌ Erro no processamento';
      document.getElementById('result-body').textContent  = JSON.stringify(data, null, 2);
      result.className = 'result erro';
    }
  } catch(e) {
    document.getElementById('result-title').textContent = '❌ Erro de conexão';
    document.getElementById('result-body').textContent  = 'Verifique se o workflow está Published no N8N.\n\n' + e.message;
    result.className = 'result erro';
  }
  result.style.display = 'block';
  btn.disabled = false;
  btn.innerHTML = '🚀 Extrair tarifas e salvar no Supabase';
}
</script>
</body>
</html>
